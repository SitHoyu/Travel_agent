server:
  port: "8080"

llm_gateway:
  base_url: http://localhost:8081
  provider: ollama
  model: qwen3:8b

amap:
  base_url: https://restapi.amap.com
  api_key: "${AMAP_API_KEY}"
  adcode_file: ../../AMap_adcode_citycode.xlsx

controller:
  max_steps: 10

auth:
  jwt_secret: "${JWT_SECRET}"
  token_ttl_hours: 24

storage:
  driver: mysql
  dsn: "${MYSQL_DSN}"
